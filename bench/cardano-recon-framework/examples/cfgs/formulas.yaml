# Each temporal operator is expressed in seconds
# NOTE: Don't reorder the formulas as they are referenced from "extracts/*.txt"!

# A contrived formula-theorem that has variables in it interpreted in a context.
- ∀n ∈ $NODES. n = "node-1" ∨ n = "node-2" ∨ n = "node-3"

# Real-world, yet trivial, Praos formulas.
- ☐ ᪲ (∀i ∈ ℤ. Forge.Loop.StartLeadershipCheck{slot = i} ⇒ ♢¹ (Forge.Loop.NodeIsLeader{slot = i} ∨ Forge.Loop.NodeNotLeader{slot = i}))
- ☐ ᪲₁ (∀i ∈ ℤ. (¬ (Forge.Loop.NodeIsLeader{slot = i} ∨ Forge.Loop.NodeNotLeader{slot = i}) |¹ Forge.Loop.StartLeadershipCheck{slot = i}))
- ☐ ᪲ (∀i ∈ ℤ. Forge.Loop.ForgedBlock{slot = i} ⇒ ♢³ Forge.Loop.AdoptedBlock{slot = i})

# A Leios formula.
- ∀s₁ ∈ ℤ. ∀h ∈ Text. RBGenerated{slot = s₁, hash = h} ⇒ (∀n ∈ $NODES. ♢⁶⁰ (∃s₂ ∈ ℤ. RBReceived{slot = s₂, hash = h, node = n} ∧ s₂ ≤ s₁ + 3))
